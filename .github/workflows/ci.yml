name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vibe
          POSTGRES_PASSWORD: vibe
          POSTGRES_DB: vibe_sorcery
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        run: pip install -r backend/requirements.txt
      - name: Import smoke test
        env:
          DATABASE_URL: postgresql://vibe:vibe@localhost:5432/vibe_sorcery
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          DEV_MOCK_GENERATION: "true"
          DEBUG: "true"
          PYTHONPATH: ${{ github.workspace }};${{ github.workspace }}/backend
        run: python -c "from app.main import app; print('OK', app.version)"
      - name: Install pytest
        run: pip install pytest
      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://vibe:vibe@localhost:5432/vibe_sorcery
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          DEV_MOCK_GENERATION: "true"
          DEBUG: "true"
          CREDITS_GATE_ENABLED: "true"
          PYTHONPATH: ${{ github.workspace }};${{ github.workspace }}/backend
        run: pytest backend/tests -q
      - name: OpenAPI schema sync check
        env:
          DATABASE_URL: postgresql://vibe:vibe@localhost:5432/vibe_sorcery
          REDIS_URL: redis://localhost:6379/0
          DEV_MOCK_GENERATION: "true"
          DEBUG: "true"
          PYTHONPATH: ${{ github.workspace }};${{ github.workspace }}/backend
        run: |
          cd backend && uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 5
          node ../scripts/sync-openapi-client.mjs http://127.0.0.1:8000/api/v1
          node ../scripts/smoke-api.mjs http://127.0.0.1:8000/api/v1

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, client]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vibe
          POSTGRES_PASSWORD: vibe
          POSTGRES_DB: vibe_sorcery
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          npm install
          pip install -r backend/requirements.txt
      - name: Build H5 for e2e
        working-directory: apps/client
        run: npm run build:h5
        env:
          TARO_APP_API_URL: http://127.0.0.1:8000/api/v1
      - name: Start API
        env:
          DATABASE_URL: postgresql://vibe:vibe@localhost:5432/vibe_sorcery
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          DEV_MOCK_GENERATION: "true"
          DEBUG: "true"
          CREDITS_GATE_ENABLED: "true"
          RUN_ALEMBIC_ON_STARTUP: "true"
          PYTHONPATH: ${{ github.workspace }};${{ github.workspace }}/backend
        run: |
          cd backend && uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 8
      - name: Install Playwright
        run: npx playwright install chromium
      - name: Run e2e tests
        env:
          CI: "true"
          E2E_API_URL: http://127.0.0.1:8000/api/v1
        run: npm run test:e2e

  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install workspaces
        run: npm install
      - name: Build H5
        working-directory: apps/client
        run: npm run build:h5
        env:
          TARO_APP_API_URL: http://localhost:8000/api/v1
      - name: H5 static smoke
        run: npm run smoke:h5
      - name: Build WeChat mini-program
        working-directory: apps/client
        run: npm run build:weapp
        env:
          TARO_APP_API_URL: http://localhost:8000/api/v1
      - name: Check mini-program package size
        working-directory: apps/client
        run: npm run check:mp-size -- --limit-kb 2048

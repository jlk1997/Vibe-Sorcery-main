<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-label="炼金音坊">
  <defs>
    <linearGradient id="gold" x1="96" y1="64" x2="416" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8c98a"/>
      <stop offset="50%" stop-color="#d4af6a"/>
      <stop offset="100%" stop-color="#b8944f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="#050508"/>
  <circle cx="256" cy="256" r="196" fill="url(#glow)"/>

  <circle cx="256" cy="256" r="168" stroke="url(#gold)" stroke-width="4" opacity="0.9"/>
  <circle cx="256" cy="256" r="132" stroke="url(#gold)" stroke-width="2" opacity="0.45"/>

  <g stroke="url(#gold)" stroke-width="3" stroke-linecap="round" opacity="0.75">
    <line x1="256" y1="88" x2="256" y2="128"/>
    <line x1="256" y1="384" x2="256" y2="424"/>
    <line x1="88" y1="256" x2="128" y2="256"/>
    <line x1="384" y1="256" x2="424" y2="256"/>
    <line x1="137" y1="137" x2="165" y2="165"/>
    <line x1="347" y1="347" x2="375" y2="375"/>
    <line x1="375" y1="137" x2="347" y2="165"/>
    <line x1="165" y1="347" x2="137" y2="375"/>
  </g>

  <g transform="translate(256 256)" filter="url(#soft)">
    <path d="M-8 -72 C-8 -72 24 -40 24 0 C24 40 -8 72 -8 72" stroke="url(#gold)" stroke-width="10" stroke-linecap="round" fill="none"/>
    <ellipse cx="-8" cy="-72" rx="18" ry="14" fill="url(#gold)"/>
    <path d="M-52 8 C-20 24 20 24 52 8" stroke="#14b8a6" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <path d="M-44 36 C-12 48 12 48 44 36" stroke="#14b8a6" stroke-width="4" stroke-linecap="round" opacity="0.45"/>
  </g>

  <circle cx="256" cy="256" r="10" fill="url(#gold)"/>
</svg>

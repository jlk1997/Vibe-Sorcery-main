# =============================================================================
# Vibe Sorcery — Nginx 站点配置（loveaibaby.cn 仅作后端 API）
#
# 放置：/etc/nginx/conf.d/loveaibaby.cn.conf
# 证书：把原 /opt/wc2026/certs 下的证书移到 /opt/vibe-sorcery/certs（或改下面路径）
# 生效：sudo nginx -t && sudo nginx -s reload
#
# 反代目标：
#   /api/            -> 127.0.0.1:8000   后端 API + WebSocket（任务进度、音频流）
#   /health          -> 127.0.0.1:8000   健康检查
#   /vibe-sorcery/   -> 127.0.0.1:9000   MinIO 封面/头像签名直链
# =============================================================================

# WebSocket 升级支持（普通请求为空，WS 请求为 upgrade）
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name loveaibaby.cn www.loveaibaby.cn;
    return 301 https://loveaibaby.cn$request_uri;
}

server {
    listen 443 ssl http2;
    server_name loveaibaby.cn www.loveaibaby.cn;

    ssl_certificate     /opt/vibe-sorcery/certs/loveaibaby.cn_bundle.pem;
    ssl_certificate_key /opt/vibe-sorcery/certs/loveaibaby.cn.key;

    # 允许上传头像/音频等（按需调大）
    client_max_body_size 50m;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    # 后端 API + WebSocket（音频流 /api/v1/works/{id}/stream 也走这里）
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # 健康检查
    location = /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # MinIO 封面/头像签名直链
    # 后端用 http://localhost:9000 生成签名，再把域名替换成 https://loveaibaby.cn，
    # 因此这里必须把 Host 头改回 localhost:9000，MinIO 才能验签通过。
    location /vibe-sorcery/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host localhost:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # 本域名不再提供前端页面
    location / {
        return 404;
    }
}

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vibe-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - vibesorcery.app
        - api.vibesorcery.app
      secretName: vibe-tls
  rules:
    - host: api.vibesorcery.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vibe-api
                port:
                  number: 80
    - host: vibesorcery.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vibe-frontend
                port:
                  number: 80
---
apiVersion: v1
kind: Service
metadata:
  name: vibe-frontend
spec:
  selector:
    app: vibe-frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibe-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vibe-frontend
  template:
    metadata:
      labels:
        app: vibe-frontend
    spec:
      containers:
        - name: frontend
          image: vibe-sorcery/client-h5:latest
          ports:
            - containerPort: 80

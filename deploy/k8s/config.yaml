apiVersion: v1
kind: ConfigMap
metadata:
  name: vibe-config
data:
  S3_ENDPOINT: "https://oss-cn-hangzhou.aliyuncs.com"
  S3_BUCKET: "vibe-sorcery-prod"
  S3_REGION: "cn-hangzhou"
  MINIMAX_API_BASE: "https://api.minimaxi.com/v1"
  MINIMAX_MUSIC_MODEL: "music-2.6"
  MINIMAX_CHAT_MODEL: "MiniMax-M3"
  CORS_ORIGINS: "https://vibesorcery.app,https://www.vibesorcery.app"
  PIPELINE_VERSION: "vibe-sorcery/2.0.0"
---
apiVersion: v1
kind: Secret
metadata:
  name: vibe-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:pass@postgres:5432/vibe_sorcery"
  JWT_SECRET: "replace-me"
  MINIMAX_API_KEY: "replace-me"
  S3_ACCESS_KEY: "replace-me"
  S3_SECRET_KEY: "replace-me"
